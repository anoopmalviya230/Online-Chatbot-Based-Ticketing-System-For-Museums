<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="login_page.css">
    <link rel="stylesheet" href="loader.css">
</head>

<body>
    <!-- Loader Overlay -->
    <div id="loader"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: rgba(255,255,255,0.95); z-index: 9999;">
        <div class="container">
            <div class="loader"></div>
            <p class="text">Logging in...</p>
        </div>
    </div>
    <a href="homepage.html" class="home-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
        Home
    </a>
    <div class="login-container">
        <div class="login-form">
            <h2>Online Chatbot Based ticketing System</h2>
            <p class="subtitle">Please enter your credentials to access the dashboard.</p>

            <div id="error-message-container" class="error-message" style="display:none;"></div>

            <form action="login_page.php" method="POST">
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <button type="submit" class="login-btn">Log In</button>

                <!-- <div class="forgot-password">
                    <a href="forgot-password.html">Forgot Password?</a>
                </div> -->

                <div class="signup-link">
                    <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
                </div>

                <div class="divider" style="text-align: center; margin: 15px 0;">
                    <span style="color: #666; font-size: 0.9em;">OR</span>
                </div>

                <!-- Google Login Button -->
                <div id="g_id_onload"
                    data-client_id="439305032170-kr2trnlop6plmr22s562h8k2c93hlt8g.apps.googleusercontent.com"
                    data-context="signin" data-ux_mode="popup" data-callback="handleCredentialResponse"
                    data-auto_prompt="false">
                </div>
                <div class="g_id_signin" data-type="standard" data-shape="rectangular" data-theme="outline"
                    data-text="signin_with" data-size="large" data-logo_alignment="center" data-width="100%">
                </div>
            </form>
        </div>
    </div>

    <!-- Google Login Script -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    </script>
    <script>
        // Function to hide loader
        function hideLoader() {
            const loader = document.getElementById('loader');
            if (loader) {
                loader.style.display = 'none';
            }
        }

        // Function to check if user is already logged in
        function checkUserSession() {
            fetch('backend/check_user_session.php')
                .then(res => res.json())
                .then(data => {
                    if (data.logged_in) {
                        // User is already logged in, redirect to chatbot
                        window.location.href = 'backend/index.php';
                    }
                })
                .catch(err => {
                    console.error('Session check error:', err);
                });
        }

        // Hide loader on page load
        window.addEventListener('load', function () {
            hideLoader();
            checkUserSession(); // Check session on load
        });

        // Hide loader when page is shown (handles browser back button)
        window.addEventListener('pageshow', function (event) {
            hideLoader();
            checkUserSession(); // Check session when page is shown
        });

        // Also hide loader immediately on DOM ready
        document.addEventListener('DOMContentLoaded', function () {
            hideLoader();
        });

        // Show loader on regular form submit
        document.querySelector('form').addEventListener('submit', function () {
            document.getElementById('loader').style.display = 'block';
        });

        // Original Google login handler with loader
        function handleCredentialResponse(response) {
            document.getElementById('loader').style.display = 'block';
            fetch('backend/google_login.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ credential: response.credential })
            })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        window.location.href = data.redirect;
                    } else {
                        document.getElementById('loader').style.display = 'none';
                        alert("Login failed: " + data.error);
                    }
                })
                .catch(err => {
                    document.getElementById('loader').style.display = 'none';
                    console.error("Error:", err);
                });
        }
    </script>
</body>

</html>
